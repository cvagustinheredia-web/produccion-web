<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOIE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#061537;
  --green:#1f8f53;
  --gray:#7b8590;
  --red:#c73b3b;
  --white:#fff;
  --overlay:rgba(255,255,255,0.12);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:var(--bg);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  margin-bottom:10px;
}

.header img{
  position:absolute;
  right:0;
  top:0;
  height:70px;
}

h1{
  font-size:48px;
  margin:0;
  font-weight:900;
}

.subtitulo{
  text-align:center;
  font-size:24px;
  margin-bottom:20px;
  font-weight:700;
}

/* BOTONES */
.botones{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
}

.refresh{ background:#2f80ed; color:white;}
.reset{ background:#ff8a00; color:white;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:14px;
}

.card{
  padding:16px;
  border-radius:16px;
  min-height:430px;
}

.produciendo{ background:var(--green);}
.esperando{ background:var(--gray);}
.parado{ background:var(--red);}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4;}
}

.titulo{
  text-align:center;
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
}

.campo{
  font-size:16px;
  margin:6px 0;
  text-transform:uppercase;
}

.contador{
  margin-top:12px;
  background:var(--overlay);
  padding:10px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:900;
}

.ok{ color:#00ff88;}
.mal{ color:#ff3b3b;}

</style>
</head>

<body>

<div class="header">
  <h1>MOIE</h1>
  <img src="logo_colven.png">
</div>

<div class="subtitulo">LINEA MOTOR</div>

<div class="grid" id="grid"></div>

<div class="botones">
  <button class="btn refresh" onclick="cargar()">ACTUALIZAR</button>
  <button class="btn reset" onclick="reiniciar()">REINICIAR</button>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo;

/* -------- FUNCIONES -------- */

function parseFecha(f){
  if(!f) return null;
  return new Date(f);
}

function msDiff(i,f){
  if(!i||!f) return 0;
  return Math.max(new Date(f)-new Date(i),0);
}

function msNow(i){
  if(!i) return 0;
  return Math.max(Date.now()-new Date(i),0);
}

function format(ms){
  let s=Math.floor(ms/1000);
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let seg=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
}

/* -------- MAIN -------- */

async function cargar(){

  const {data:reg}=await supabaseClient.from('registros').select('*').order('inicio',{ascending:true});
  const {data:ops}=await supabaseClient.from('operarios').select('*');

  let mapa={};
  ops.forEach(o=>mapa[o.legajo]=o.nombre);

  let html="";

  for(let p=1;p<=6;p++){

    let r=reg.filter(x=>x.puesto==p);
    let ultimo=r[r.length-1];
    let activo=r.find(x=>x.fin==null);

    let estado="ESPERANDO";
    let clase="esperando";
    let blink="";
    let legajo="-";
    let nombre="-";
    let producto="-";
    let motivo="-";

    let prodMs=0;
    let paradaMs=0;
    let actualMs=0;
    let piezas=r.length;

    r.forEach(x=>{
      if(x.estado=="parado"){
        paradaMs+= x.fin? msDiff(x.inicio,x.fin): msNow(x.inicio);
      }else{
        let t=x.fin? msDiff(x.inicio,x.fin): msNow(x.inicio);
        prodMs+=t;
        if(!x.fin) actualMs=t;
      }
    });

    if(activo){
      estado="PRODUCCION";
      clase="produciendo";
      legajo=activo.operario;
      nombre=mapa[activo.operario]||"-";
      producto=activo.producto;
    }

    if(ultimo && ultimo.estado=="parado"){
      estado="PARADO";
      clase="parado";
      blink="blink";
      legajo=ultimo.operario;
      nombre=mapa[ultimo.operario]||"-";
      producto=ultimo.producto;
      motivo=ultimo.motivo_parada;
      actualMs=0;
    }

    /* OBJETIVO */
    let objetivo = (p<=4)?13*60*1000:(p==5?25*60*1000:null);
    let estadoTiempo = "";

    if(objetivo){
      estadoTiempo = actualMs <= objetivo
        ? `<span class="ok">OK</span>`
        : `<span class="mal">EXCEDIDO</span>`;
    }

    html+=`
    <div class="card ${clase} ${blink}">
      <div class="titulo">${p==6?"PROBADOR":"PUESTO "+p}</div>

      <div class="campo"><b>ESTADO:</b> ${estado}</div>
      <div class="campo"><b>LEGAJO:</b> ${legajo}</div>
      <div class="campo"><b>OPERARIO:</b> ${nombre}</div>
      <div class="campo"><b>PRODUCTO:</b> ${producto}</div>
      <div class="campo"><b>MOTIVO:</b> ${motivo}</div>
      <div class="campo"><b>PIEZAS:</b> ${piezas}</div>

      <div class="contador">
        TIEMPO TOTAL
        <div class="valor">${format(prodMs)}</div>
      </div>

      <div class="contador">
        CODIGO EN CURSO
        <div class="valor">${format(actualMs)} ${estadoTiempo}</div>
      </div>

      <div class="contador">
        TIEMPO PARADA
        <div class="valor">${format(paradaMs)}</div>
      </div>

    </div>`;
  }

  document.getElementById("grid").innerHTML=html;
}

/* -------- CONTROL -------- */

function iniciar(){
  if(intervalo) clearInterval(intervalo);
  cargar();
  intervalo=setInterval(cargar,1000);
}

function reiniciar(){
  clearInterval(intervalo);
  document.getElementById("grid").innerHTML="";
  setTimeout(iniciar,300);
}

iniciar();

</script>

</body>
</html>
