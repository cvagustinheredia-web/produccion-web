<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOIE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#061537;
  --green:#1f8f53;
  --gray:#7b8590;
  --red:#c73b3b;
  --orange:#d9821f;
  --overlay:rgba(255,255,255,0.12);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:8px;
}

.header-left{ width:220px; }
.header-center{ flex:1; text-align:center; }
.header-right{
  width:220px;
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}

.header img{ height:70px; }

h1{
  font-size:48px;
  margin:0;
  font-weight:900;
  text-align:center;
}

.subtitulo-row{
  margin-top:10px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
}

.subtitulo{
  text-align:left;
  font-size:24px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:14px;
  margin-top:16px;
}

.card{
  padding:16px;
  border-radius:16px;
  min-height:450px;
}

.produciendo{ background:var(--green); }
.esperando{ background:var(--gray); }
.parado{ background:var(--red); }
.turno{ background:var(--orange); }

.blink{ animation:blink 1s infinite; }

@keyframes blink{
  50%{ opacity:0.4; }
}

.titulo{
  text-align:center;
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
  text-transform:uppercase;
}

.campo{
  font-size:16px;
  margin:6px 0;
  text-transform:uppercase;
}

.contador{
  margin-top:12px;
  background:var(--overlay);
  padding:10px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:900;
}

.ok{ color:#00ff88; }
.mal{ color:#ff3b3b; }

.botones{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:white;
}

.refresh{ background:#2f80ed; }
.reset{ background:#ff8a00; }

.info-reset{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.12);
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left"></div>

  <div class="header-center">
    <h1>MOIE</h1>
  </div>

  <div class="header-right">
    <img src="logo_colven.png" alt="Colven">
  </div>
</div>

<div class="subtitulo-row">
  <div class="subtitulo">LINEA MOTOR</div>
</div>

<div class="grid" id="grid"></div>

<div class="botones">
  <button class="btn refresh" onclick="cargar()">ACTUALIZAR</button>
  <button class="btn reset" onclick="reiniciarDashboard()">REINICIAR</button>
</div>

<div class="info-reset" id="infoReset">REINICIO GLOBAL: SIN CONFIGURAR</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo = null;

// ---------- utilidades ----------
function parseFecha(valor){
  if(!valor) return null;
  const f = new Date(valor);
  return isNaN(f.getTime()) ? null : f;
}

function formatHoraArgentina(fecha){
  if(!fecha) return "SIN CONFIGURAR";
  return new Intl.DateTimeFormat('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  }).format(fecha);
}

function format(ms){
  if(!ms || ms < 0 || isNaN(ms)) ms = 0;
  const totalSeg = Math.floor(ms / 1000);
  const horas = Math.floor(totalSeg / 3600);
  const minutos = Math.floor((totalSeg % 3600) / 60);
  const segundos = totalSeg % 60;
  return `${String(horas).padStart(2,'0')}:${String(minutos).padStart(2,'0')}:${String(segundos).padStart(2,'0')}`;
}

// ---------- reset global ----------
async function obtenerResetGlobal(){
  const { data, error } = await supabaseClient
    .from('dashboard_control')
    .select('id, reset_desde')
    .eq('id', 1)
    .maybeSingle();

  if (error) {
    console.log("Error leyendo reset global:", error);
    return null;
  }

  if (!data) return null;
  return data.reset_desde ? parseFecha(data.reset_desde) : null;
}

async function actualizarInfoReset(){
  const resetDesde = await obtenerResetGlobal();
  document.getElementById("infoReset").innerText =
    resetDesde
      ? "REINICIO GLOBAL DESDE: " + formatHoraArgentina(resetDesde)
      : "REINICIO GLOBAL: SIN CONFIGURAR";
}

// ---------- dashboard ----------
async function cargar(){
  const { data: reg = [], error: errReg } = await supabaseClient
    .from('registros')
    .select('*')
    .order('inicio', { ascending: true });

  const { data: ops = [], error: errOps } = await supabaseClient
    .from('operarios')
    .select('*');

  if (errReg || errOps) {
    console.log(errReg || errOps);
    return;
  }

  const resetDesde = await obtenerResetGlobal();

  const mapaOperarios = {};
  ops.forEach(o => {
    mapaOperarios[String(o.legajo)] = o.nombre;
  });

  let html = '';

  for(let p = 1; p <= 6; p++){
    const regsPuesto = reg
      .filter(x => Number(x.puesto) === p)
      .filter(x => {
        const inicio = parseFecha(x.inicio);
        if (!inicio) return false;

        // ignorar registros marcados como reiniciados
        if ((x.estado || '').toLowerCase() === 'reiniciado') return false;

        // mostrar solo desde el reinicio global
        if (!resetDesde) return true;
        return inicio.getTime() >= resetDesde.getTime();
      })
      .sort((a,b) => parseFecha(a.inicio) - parseFecha(b.inicio));

    let estado = "ESPERANDO";
    let clase = "esperando";
    let blink = "";
    let legajo = "-";
    let nombre = "-";
    let producto = "-";
    let motivo = "-";

    let tiempoTotalMs = 0;
    let tiempoParadaMs = 0;
    let tiempoCodigoMs = 0;

    const piezas = regsPuesto.filter(r =>
      (r.tipo_registro || '').toLowerCase() === 'lectura'
    ).length;

    const ultimaLectura = [...regsPuesto]
      .reverse()
      .find(r => (r.tipo_registro || '').toLowerCase() === 'lectura');

    const ultimoEvento = regsPuesto.length ? regsPuesto[regsPuesto.length - 1] : null;

    if (regsPuesto.length === 0) {
      html += `
        <div class="card esperando">
          <div class="titulo">${p === 6 ? "PROBADOR" : "PUESTO " + p}</div>

          <div class="campo"><b>ESTADO:</b> ESPERANDO</div>
          <div class="campo"><b>LEGAJO:</b> -</div>
          <div class="campo"><b>OPERARIO:</b> -</div>
          <div class="campo"><b>PRODUCTO:</b> -</div>
          <div class="campo"><b>MOTIVO:</b> -</div>
          <div class="campo"><b>PIEZAS:</b> 0</div>

          <div class="contador">
            TIEMPO TOTAL
            <div class="valor">00:00:00</div>
          </div>

          <div class="contador">
            CODIGO EN CURSO
            <div class="valor">00:00:00 ${p <= 5 ? '<span class="ok">OK</span>' : ''}</div>
          </div>

          <div class="contador">
            TIEMPO PARADA
            <div class="valor">00:00:00</div>
          </div>
        </div>
      `;
      continue;
    }

    // TIEMPO TOTAL
    const inicioPrimero = parseFecha(regsPuesto[0].inicio);
    if (inicioPrimero) {
      if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado') {
        const finTurno = parseFecha(ultimoEvento.fin || ultimoEvento.inicio);
        tiempoTotalMs = finTurno ? Math.max(finTurno.getTime() - inicioPrimero.getTime(), 0) : 0;
      } else {
        tiempoTotalMs = Math.max(Date.now() - inicioPrimero.getTime(), 0);
      }
    }

    // TIEMPO PARADA
    regsPuesto.forEach(r => {
      const inicio = parseFecha(r.inicio);
      const fin = parseFecha(r.fin);
      const estadoReg = (r.estado || '').toLowerCase();

      if (!inicio) return;

      if (estadoReg === 'parado') {
        if (fin) {
          tiempoParadaMs += Math.max(fin.getTime() - inicio.getTime(), 0);
        } else {
          tiempoParadaMs += Math.max(Date.now() - inicio.getTime(), 0);
        }
      }
    });

    const activoProduccion = regsPuesto.find(r => r.fin == null && (r.estado || '').toLowerCase() === 'produciendo');
    const activoParada = regsPuesto.find(r => r.fin == null && (r.estado || '').toLowerCase() === 'parado');

    // CODIGO EN CURSO
    if (activoProduccion) {
      const inicioActivo = parseFecha(activoProduccion.inicio);
      if (inicioActivo) {
        tiempoCodigoMs = Math.max(Date.now() - inicioActivo.getTime(), 0);
      }
    } else if (activoParada && ultimaLectura) {
      const inicioLectura = parseFecha(ultimaLectura.inicio);
      if (inicioLectura) {
        tiempoCodigoMs = Math.max(Date.now() - inicioLectura.getTime(), 0);
      }
    } else if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado' && ultimaLectura) {
      const inicioLectura = parseFecha(ultimaLectura.inicio);
      const finTurno = parseFecha(ultimoEvento.fin || ultimoEvento.inicio);
      if (inicioLectura && finTurno) {
        tiempoCodigoMs = Math.max(finTurno.getTime() - inicioLectura.getTime(), 0);
      }
    }

    if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado') {
      estado = "TURNO FINALIZADO";
      clase = "turno";
      blink = "";
      legajo = ultimoEvento.operario || "-";
      nombre = mapaOperarios[String(ultimoEvento.operario)] || "-";

      const ultimaLecturaPrev = [...regsPuesto]
        .reverse()
        .find(r => ['lectura','continuacion','cambio_operario'].includes((r.tipo_registro || '').toLowerCase()));
      if (ultimaLecturaPrev) {
        producto = ultimaLecturaPrev.producto || "-";
      }
    } else if (activoProduccion) {
      estado = "PRODUCIENDO";
      clase = "produciendo";
      legajo = activoProduccion.operario || "-";
      nombre = mapaOperarios[String(activoProduccion.operario)] || "-";
      producto = activoProduccion.producto || "-";
      motivo = "-";
    } else if (activoParada) {
      estado = "PARADO";
      clase = "parado";
      blink = "blink";
      legajo = activoParada.operario || "-";
      nombre = mapaOperarios[String(activoParada.operario)] || "-";
      producto = activoParada.producto || "-";
      motivo = activoParada.motivo_parada || "-";
    }

    let objetivo = null;
    if (p >= 1 && p <= 4) objetivo = 13 * 60 * 1000;
    if (p === 5) objetivo = 25 * 60 * 1000;

    let estadoTiempo = "";
    if (objetivo !== null) {
      estadoTiempo = tiempoCodigoMs <= objetivo
        ? `<span class="ok">OK</span>`
        : `<span class="mal">EXCEDIDO</span>`;
    }

    html += `
      <div class="card ${clase} ${blink}">
        <div class="titulo">${p === 6 ? "PROBADOR" : "PUESTO " + p}</div>

        <div class="campo"><b>ESTADO:</b> ${estado}</div>
        <div class="campo"><b>LEGAJO:</b> ${legajo}</div>
        <div class="campo"><b>OPERARIO:</b> ${nombre}</div>
        <div class="campo"><b>PRODUCTO:</b> ${producto}</div>
        <div class="campo"><b>MOTIVO:</b> ${motivo}</div>
        <div class="campo"><b>PIEZAS:</b> ${piezas}</div>

        <div class="contador">
          TIEMPO TOTAL
          <div class="valor">${format(tiempoTotalMs)}</div>
        </div>

        <div class="contador">
          CODIGO EN CURSO
          <div class="valor">${format(tiempoCodigoMs)} ${estadoTiempo}</div>
        </div>

        <div class="contador">
          TIEMPO PARADA
          <div class="valor">${format(tiempoParadaMs)}</div>
        </div>
      </div>
    `;
  }

  document.getElementById("grid").innerHTML = html;
  await actualizarInfoReset();
}

// ---------- controles ----------
function iniciar(){
  if (intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar, 1000);
}

async function reiniciarDashboard(){
  const ts = new Date().toISOString();

  // 1) guardar reinicio global
  const { error: errorReset } = await supabaseClient
    .from('dashboard_control')
    .upsert(
      [{ id: 1, reset_desde: ts }],
      { onConflict: 'id' }
    );

  if (errorReset) {
    alert("Error al guardar reinicio global");
    console.log(errorReset);
    return;
  }

  // 2) cerrar todos los registros abiertos y marcarlos como reiniciados
  const { error: errorCerrar } = await supabaseClient
    .from('registros')
    .update({
      fin: ts,
      estado: 'reiniciado'
    })
    .is('fin', null);

  if (errorCerrar) {
    alert("Error al cerrar registros abiertos");
    console.log(errorCerrar);
    return;
  }

  clearInterval(intervalo);
  document.getElementById("grid").innerHTML = "";
  setTimeout(() => {
    iniciar();
  }, 300);
}

iniciar();
</script>

</body>
</html>
