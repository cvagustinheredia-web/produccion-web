<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOIE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#061537;
  --green:#1f8f53;
  --gray:#7b8590;
  --red:#c73b3b;
  --white:#fff;
  --overlay:rgba(255,255,255,0.12);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:white;
}

.header{
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:start;
  margin-bottom:8px;
}

.header-left{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  padding-top:10px;
}

.header-center{
  text-align:center;
}

.header-right{
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}

.header img{
  height:70px;
}

h1{
  font-size:48px;
  margin:0;
  font-weight:900;
}

.subtitulo{
  text-align:left;
  font-size:24px;
  margin-top:10px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:14px;
  margin-top:16px;
}

.card{
  padding:16px;
  border-radius:16px;
  min-height:430px;
}

.produciendo{ background:var(--green);}
.esperando{ background:var(--gray);}
.parado{ background:var(--red);}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.4;}
}

.titulo{
  text-align:center;
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
  text-transform:uppercase;
}

.campo{
  font-size:16px;
  margin:6px 0;
  text-transform:uppercase;
}

.contador{
  margin-top:12px;
  background:var(--overlay);
  padding:10px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:900;
}

.ok{ color:#00ff88;}
.mal{ color:#ff3b3b;}

.botones{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:white;
}

.refresh{ background:#2f80ed; }
.reset{ background:#ff8a00; }

.info-reset{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.12);
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <div class="subtitulo">LINEA MOTOR</div>
  </div>

  <div class="header-center">
    <h1>MOIE</h1>
  </div>

  <div class="header-right">
    <img src="logo_colven.png" alt="Colven">
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="botones">
  <button class="btn refresh" onclick="cargar()">ACTUALIZAR</button>
  <button class="btn reset" onclick="reiniciarDashboard()">REINICIAR</button>
</div>

<div class="info-reset" id="infoReset">REINICIO: SIN CONFIGURAR</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo;

function parseFecha(f){
  if(!f) return null;
  const fecha = new Date(f);
  return isNaN(fecha.getTime()) ? null : fecha;
}

function msDiff(i,f){
  const ini = parseFecha(i);
  const fin = parseFecha(f);
  if(!ini || !fin) return 0;
  return Math.max(fin - ini, 0);
}

function msNow(i){
  const ini = parseFecha(i);
  if(!ini) return 0;
  return Math.max(Date.now() - ini.getTime(), 0);
}

function format(ms){
  if(!ms || ms < 0 || isNaN(ms)) ms = 0;
  let s = Math.floor(ms/1000);
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let seg = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
}

function fechaMayor(a, b) {
  if (!a) return b;
  if (!b) return a;
  return a > b ? a : b;
}

async function obtenerResetGlobal() {
  const { data, error } = await supabaseClient
    .from('dashboard_control')
    .select('*')
    .eq('id', 1)
    .single();

  if (error) {
    console.log(error);
    return null;
  }

  return data?.reset_desde ? new Date(data.reset_desde) : null;
}

async function actualizarInfoReset() {
  const resetDesde = await obtenerResetGlobal();
  document.getElementById("infoReset").innerText =
    resetDesde
      ? "REINICIO GLOBAL DESDE: " + new Date(resetDesde).toLocaleString()
      : "REINICIO GLOBAL: SIN CONFIGURAR";
}

async function cargar(){
  const {data:reg = []} = await supabaseClient
    .from('registros')
    .select('*')
    .order('inicio',{ascending:true});

  const {data:ops = []} = await supabaseClient
    .from('operarios')
    .select('*');

  const resetDesde = await obtenerResetGlobal();

  const mapa = {};
  ops.forEach(o => mapa[o.legajo] = o.nombre);

  let html = "";

  for(let p=1; p<=6; p++){
    const regs = reg.filter(x => Number(x.puesto) === p);
    const ultimo = regs[regs.length - 1];
    const activo = regs.find(x => x.fin == null);

    let estado = "ESPERANDO";
    let clase = "esperando";
    let blink = "";
    let legajo = "-";
    let nombre = "-";
    let producto = "-";
    let motivo = "-";

    let prodMs = 0;
    let paradaMs = 0;
    let actualMs = 0;
    let piezas = 0;

    regs.forEach(x => {
      const inicio = parseFecha(x.inicio);
      const fin = parseFecha(x.fin);
      if (!inicio) return;

      if (resetDesde && inicio < resetDesde && (!fin || fin <= resetDesde)) {
        return;
      }

      const inicioEfectivo = resetDesde ? fechaMayor(inicio, resetDesde) : inicio;
      const finEfectivo = fin ? fin : new Date();
      const ms = Math.max(finEfectivo - inicioEfectivo, 0);

      const estadoReg = (x.estado || "").toLowerCase();

      if (estadoReg === "parado") {
        paradaMs += ms;
      } else {
        prodMs += ms;
        if (!x.fin) {
          actualMs = ms;
        }
      }

      if (estadoReg !== "parado") {
        if (!resetDesde || inicio >= resetDesde) {
          piezas += 1;
        }
      }
    });

    if(activo){
      const inicioActivo = parseFecha(activo.inicio);
      const activoDespuesReset = !resetDesde || (inicioActivo && inicioActivo >= resetDesde) || (inicioActivo && resetDesde && activo.fin == null);

      if (activoDespuesReset) {
        estado = "PRODUCCION";
        clase = "produciendo";
        legajo = activo.operario || "-";
        nombre = mapa[activo.operario] || "-";
        producto = activo.producto || "-";
      }
    }

    if(ultimo && (ultimo.estado || "").toLowerCase() === "parado"){
      const inicioUlt = parseFecha(ultimo.inicio);
      const finUlt = parseFecha(ultimo.fin);

      const mostrarParado = !resetDesde || (
        inicioUlt && (
          inicioUlt >= resetDesde ||
          (finUlt && finUlt > resetDesde)
        )
      );

      if (mostrarParado && !activo) {
        estado = "PARADO";
        clase = "parado";
        blink = "blink";
        legajo = ultimo.operario || "-";
        nombre = mapa[ultimo.operario] || "-";
        producto = ultimo.producto || "-";
        motivo = ultimo.motivo_parada || "-";
        actualMs = 0;
      }
    }

    const hayActividadDesdeReset = piezas > 0 || prodMs > 0 || paradaMs > 0 || actualMs > 0;
    if (!hayActividadDesdeReset && !activo) {
      estado = "ESPERANDO";
      clase = "esperando";
      blink = "";
      legajo = "-";
      nombre = "-";
      producto = "-";
      motivo = "-";
    }

    let objetivo = (p <= 4) ? 13 * 60 * 1000 : (p == 5 ? 25 * 60 * 1000 : null);
    let estadoTiempo = "";

    if (objetivo) {
      estadoTiempo = actualMs <= objetivo
        ? `<span class="ok">OK</span>`
        : `<span class="mal">EXCEDIDO</span>`;
    }

    html += `
    <div class="card ${clase} ${blink}">
      <div class="titulo">${p == 6 ? "PROBADOR" : "PUESTO " + p}</div>

      <div class="campo"><b>ESTADO:</b> ${estado}</div>
      <div class="campo"><b>LEGAJO:</b> ${legajo}</div>
      <div class="campo"><b>OPERARIO:</b> ${nombre}</div>
      <div class="campo"><b>PRODUCTO:</b> ${producto}</div>
      <div class="campo"><b>MOTIVO:</b> ${motivo}</div>
      <div class="campo"><b>PIEZAS:</b> ${piezas}</div>

      <div class="contador">
        TIEMPO TOTAL
        <div class="valor">${format(prodMs)}</div>
      </div>

      <div class="contador">
        CODIGO EN CURSO
        <div class="valor">${format(actualMs)} ${estadoTiempo}</div>
      </div>

      <div class="contador">
        TIEMPO PARADA
        <div class="valor">${format(paradaMs)}</div>
      </div>
    </div>`;
  }

  document.getElementById("grid").innerHTML = html;
  await actualizarInfoReset();
}

function iniciar(){
  if(intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar, 1000);
}

async function reiniciarDashboard(){
  const ahora = new Date().toISOString();

  const { error } = await supabaseClient
    .from('dashboard_control')
    .update({ reset_desde: ahora })
    .eq('id', 1);

  if (error) {
    alert("Error al reiniciar globalmente");
    console.log(error);
    return;
  }

  clearInterval(intervalo);
  document.getElementById("grid").innerHTML = "";
  setTimeout(iniciar, 200);
}

iniciar();
</script>

</body>
</html>
