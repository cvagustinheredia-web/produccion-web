<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Producción</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root{
      --bg:#061537;
      --panel-green:#1f8f53;
      --panel-gray:#7b8590;
      --panel-red:#c73b3b;
      --box-overlay:rgba(255,255,255,0.14);
      --text:#ffffff;
      --blue:#2f80ed;
      --orange:#ff8a00;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 900;
      text-align:center;
      flex:1;
    }

    .acciones{
      display:flex;
      gap:10px;
    }

    .btn{
      border:none;
      border-radius:10px;
      padding:12px 16px;
      font-weight:800;
      color:white;
      cursor:pointer;
    }

    .btn-refresh{ background:var(--blue); }
    .btn-reset{ background:var(--orange); }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .card {
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
      min-height: 410px;
    }

    .produciendo { background: var(--panel-green); }
    .esperando { background: var(--panel-gray); }
    .parado { background: var(--panel-red); }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity:1; }
      50% { opacity:0.4; }
      100% { opacity:1; }
    }

    .titulo {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .campo {
      margin: 8px 0;
      font-size: 18px;
    }

    .contador {
      margin-top: 16px;
      padding: 12px;
      background: var(--box-overlay);
      border-radius: 10px;
      font-size: 18px;
    }

    .valor {
      font-size: 22px;
      font-weight: 900;
      display:block;
      margin-top:6px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="acciones">
    <button class="btn btn-refresh" onclick="cargar()">ACTUALIZAR</button>
    <button class="btn btn-reset" onclick="reiniciar()">REINICIAR</button>
  </div>

  <h1>PRODUCCION DE INSTALACION ELECTRICA</h1>

  <div></div>
</div>

<div class="grid" id="grid"></div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo;

// parse correcto de fecha
function parseFecha(f){
  if(!f) return null;
  return new Date(f.replace(' ', 'T'));
}

function tiempo(fecha){
  if(!fecha) return "00:00:00";

  let ms = new Date() - fecha;
  if(ms < 0) ms = 0;

  let s = Math.floor(ms/1000);
  let h = Math.floor(s/3600);
  let m = Math.floor((s%3600)/60);
  let seg = s%60;

  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
}

async function cargar(){

  const {data:registros} = await supabaseClient.from('registros').select('*').order('inicio',{ascending:true});
  const {data:ops} = await supabaseClient.from('operarios').select('*');

  let mapa = {};
  ops.forEach(o=> mapa[o.legajo]=o.nombre);

  let html = "";

  for(let p=1;p<=5;p++){

    let regs = registros.filter(r=>r.puesto==p);
    let activo = regs.find(r=>r.fin==null);
    let ultimo = regs[regs.length-1];
    let primero = regs[0];

    let clase="esperando";
    let blink="";
    let estado="Esperando lectura";
    let legajo="-";
    let nombre="-";
    let producto="-";
    let motivo="-";
    let t1="00:00:00";
    let t2="00:00:00";

    if(primero) t1 = tiempo(parseFecha(primero.inicio));

    if(activo){
      clase="produciendo";
      estado="Producción en proceso";
      legajo=activo.operario;
      nombre=mapa[activo.operario] || "-";
      producto=activo.producto;
      t2=tiempo(parseFecha(activo.inicio));
    }
    else if(ultimo && ultimo.estado=="parado"){
      clase="parado";
      blink="blink";
      estado="PARADO";
      legajo=ultimo.operario;
      nombre=mapa[ultimo.operario] || "-";
      producto=ultimo.producto;
      motivo=ultimo.motivo_parada;
    }

    html+=`
    <div class="card ${clase} ${blink}">
      <div class="titulo">PUESTO ${p}</div>

      <div class="campo"><b>Estado:</b> ${estado}</div>
      <div class="campo"><b>Legajo:</b> ${legajo}</div>
      <div class="campo"><b>Operario:</b> ${nombre}</div>
      <div class="campo"><b>Producto:</b> ${producto}</div>
      <div class="campo"><b>Motivo parada:</b> ${motivo}</div>

      <div class="contador">
        Tiempo total del puesto
        <span class="valor">${t1}</span>
      </div>

      <div class="contador">
        Tiempo del código en curso
        <span class="valor">${t2}</span>
      </div>
    </div>`;
  }

  document.getElementById("grid").innerHTML = html;
}

function iniciar(){
  if(intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar,1000);
}

function reiniciar(){
  clearInterval(intervalo);
  document.getElementById("grid").innerHTML="";
  setTimeout(iniciar,300);
}

iniciar();
</script>

</body>
</html>
