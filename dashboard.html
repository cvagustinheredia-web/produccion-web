<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOIE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#061537;
  --green:#1f8f53;
  --gray:#7b8590;
  --red:#c73b3b;
  --overlay:rgba(255,255,255,0.12);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:8px;
}

.header-left{
  width:220px;
}

.header-center{
  flex:1;
  text-align:center;
}

.header-right{
  width:220px;
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}

.header img{
  height:70px;
}

h1{
  font-size:48px;
  margin:0;
  font-weight:900;
  text-align:center;
}

.subtitulo-row{
  margin-top:10px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
}

.subtitulo{
  text-align:left;
  font-size:24px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns: repeat(6,1fr);
  gap:14px;
  margin-top:16px;
}

.card{
  padding:16px;
  border-radius:16px;
  min-height:430px;
}

.produciendo{ background:var(--green);}
.esperando{ background:var(--gray);}
.parado{ background:var(--red);}

.blink{ animation:blink 1s infinite; }

@keyframes blink{
  50%{opacity:0.4;}
}

.titulo{
  text-align:center;
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
  text-transform:uppercase;
}

.campo{
  font-size:16px;
  margin:6px 0;
  text-transform:uppercase;
}

.contador{
  margin-top:12px;
  background:var(--overlay);
  padding:10px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:900;
}

.ok{ color:#00ff88;}
.mal{ color:#ff3b3b;}

.botones{
  position:fixed;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:white;
}

.refresh{ background:#2f80ed; }
.reset{ background:#ff8a00; }

.info-reset{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.12);
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
}

@media (max-width: 1700px){
  .grid{
    grid-template-columns: repeat(3,1fr);
  }
}

@media (max-width: 1000px){
  .grid{
    grid-template-columns: repeat(2,1fr);
  }
}

@media (max-width: 700px){
  .grid{
    grid-template-columns: 1fr;
  }

  .header{
    flex-direction:column;
    gap:12px;
  }

  .header-left,
  .header-center,
  .header-right{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
  }

  .subtitulo-row{
    justify-content:center;
  }

  .subtitulo{
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left"></div>

  <div class="header-center">
    <h1>MOIE</h1>
  </div>

  <div class="header-right">
    <img src="logo_colven.png" alt="Colven">
  </div>
</div>

<div class="subtitulo-row">
  <div class="subtitulo">LINEA MOTOR</div>
</div>

<div class="grid" id="grid"></div>

<div class="botones">
  <button class="btn refresh" onclick="cargar()">ACTUALIZAR</button>
  <button class="btn reset" onclick="reiniciarDashboard()">REINICIAR</button>
</div>

<div class="info-reset" id="infoReset">REINICIO GLOBAL: SIN CONFIGURAR</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo;

function parseFecha(valor){
  if(!valor) return null;
  const f = new Date(valor);
  return isNaN(f.getTime()) ? null : f;
}

function formatHoraArgentina(fecha){
  if(!fecha) return "SIN CONFIGURAR";
  return new Intl.DateTimeFormat('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  }).format(fecha);
}

function format(ms){
  if(!ms || ms < 0 || isNaN(ms)) ms = 0;
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const seg = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
}

async function obtenerResetGlobal(){
  const { data } = await supabaseClient
    .from('dashboard_control')
    .select('*')
    .eq('id', 1)
    .single();

  return data?.reset_desde ? parseFecha(data.reset_desde) : null;
}

async function actualizarInfoReset(){
  const resetDesde = await obtenerResetGlobal();
  document.getElementById("infoReset").innerText =
    resetDesde
      ? "REINICIO GLOBAL DESDE: " + formatHoraArgentina(resetDesde)
      : "REINICIO GLOBAL: SIN CONFIGURAR";
}

async function cargar(){
  const { data: reg = [] } = await supabaseClient
    .from('registros')
    .select('*')
    .order('inicio', { ascending: true });

  const { data: ops = [] } = await supabaseClient
    .from('operarios')
    .select('*');

  const resetDesde = await obtenerResetGlobal();

  const mapa = {};
  ops.forEach(o => mapa[String(o.legajo)] = o.nombre);

  let html = "";

  for(let p = 1; p <= 6; p++){
    const regs = reg.filter(x => Number(x.puesto) === p);

    const regsDesdeReset = regs.filter(x => {
      const inicio = parseFecha(x.inicio);
      return !resetDesde || (inicio && inicio >= resetDesde);
    });

    const activo = regsDesdeReset.find(x => x.fin == null && (x.estado || '').toLowerCase() === 'produciendo');
    const paradaActiva = regsDesdeReset.find(x => x.fin == null && (x.estado || '').toLowerCase() === 'parado');
    const ultimo = regsDesdeReset.length ? regsDesdeReset[regsDesdeReset.length - 1] : null;
    const primero = regsDesdeReset.length ? regsDesdeReset[0] : null;

    let estado = "ESPERANDO";
    let clase = "esperando";
    let blink = "";
    let legajo = "-";
    let nombre = "-";
    let producto = "-";
    let motivo = "-";

    let tiempoTotalMs = 0;
    let tiempoParadaMs = 0;
    let tiempoCodigoMs = 0;
    let piezas = regsDesdeReset.filter(x => (x.estado || '').toLowerCase() === 'produciendo').length;

    if (primero) {
      tiempoTotalMs = Date.now() - parseFecha(primero.inicio).getTime();
      if (tiempoTotalMs < 0) tiempoTotalMs = 0;
    }

    regsDesdeReset.forEach(x => {
      const inicio = parseFecha(x.inicio);
      const fin = parseFecha(x.fin);
      if (!inicio) return;

      const estadoReg = (x.estado || '').toLowerCase();

      if (estadoReg === 'parado') {
        if (fin) {
          tiempoParadaMs += Math.max(fin.getTime() - inicio.getTime(), 0);
        } else {
          tiempoParadaMs += Math.max(Date.now() - inicio.getTime(), 0);
        }
      }
    });

    if (activo) {
      estado = "PRODUCCION";
      clase = "produciendo";
      legajo = activo.operario || "-";
      nombre = mapa[String(activo.operario)] || "-";
      producto = activo.producto || "-";
      tiempoCodigoMs = Math.max(Date.now() - parseFecha(activo.inicio).getTime(), 0);
    } else if (paradaActiva) {
      estado = "PARADO";
      clase = "parado";
      blink = "blink";
      legajo = paradaActiva.operario || "-";
      nombre = mapa[String(paradaActiva.operario)] || "-";
      producto = paradaActiva.producto || "-";
      motivo = paradaActiva.motivo_parada || "-";
      tiempoCodigoMs = 0;
    } else if (ultimo) {
      legajo = ultimo.operario || "-";
      nombre = mapa[String(ultimo.operario)] || "-";
    }

    let objetivo = null;
    if (p >= 1 && p <= 4) objetivo = 13 * 60 * 1000;
    if (p === 5) objetivo = 25 * 60 * 1000;

    let estadoTiempo = "";
    if (objetivo !== null) {
      estadoTiempo = tiempoCodigoMs <= objetivo
        ? `<span class="ok">OK</span>`
        : `<span class="mal">EXCEDIDO</span>`;
    }

    html += `
      <div class="card ${clase} ${blink}">
        <div class="titulo">${p === 6 ? "PROBADOR" : "PUESTO " + p}</div>

        <div class="campo"><b>ESTADO:</b> ${estado}</div>
        <div class="campo"><b>LEGAJO:</b> ${legajo}</div>
        <div class="campo"><b>OPERARIO:</b> ${nombre}</div>
        <div class="campo"><b>PRODUCTO:</b> ${producto}</div>
        <div class="campo"><b>MOTIVO:</b> ${motivo}</div>
        <div class="campo"><b>PIEZAS:</b> ${piezas}</div>

        <div class="contador">
          TIEMPO TOTAL
          <div class="valor">${format(tiempoTotalMs)}</div>
        </div>

        <div class="contador">
          CODIGO EN CURSO
          <div class="valor">${format(tiempoCodigoMs)} ${estadoTiempo}</div>
        </div>

        <div class="contador">
          TIEMPO PARADA
          <div class="valor">${format(tiempoParadaMs)}</div>
        </div>
      </div>
    `;
  }

  document.getElementById("grid").innerHTML = html;
  await actualizarInfoReset();
}

function iniciar(){
  if(intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar, 1000);
}

async function reiniciarDashboard(){
  const ahora = new Date().toISOString();

  const { error } = await supabaseClient
    .from('dashboard_control')
    .update({ reset_desde: ahora })
    .eq('id', 1);

  if(error){
    alert("Error al reiniciar globalmente");
    console.log(error);
    return;
  }

  clearInterval(intervalo);
  document.getElementById("grid").innerHTML = "";
  setTimeout(iniciar, 200);
}

iniciar();
</script>

</body>
</html>
