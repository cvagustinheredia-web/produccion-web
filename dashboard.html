<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Producción</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; background:#111; color:white; }
    .grid { display:grid; grid-template-columns: repeat(5,1fr); gap:10px; }
    .card {
      padding:20px;
      border-radius:10px;
      text-align:center;
      font-size:18px;
    }
    .ok { background:green; }
    .stop { background:red; }
  </style>
</head>
<body>

<h1>🏭 Producción en Vivo</h1>

<div class="grid" id="grid"></div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

async function cargar(){
  let { data } = await supabaseClient
    .from('registros')
    .select('*')
    .is('fin', null);

  let html = '';

  for(let i=1;i<=5;i++){
    let r = data.find(x => x.puesto == i);

    if(r){
      html += `
        <div class="card ok">
          <h2>Puesto ${i}</h2>
          <p>${r.producto}</p>
          <p>Operario: ${r.operario}</p>
        </div>
      `;
    } else {
      html += `
        <div class="card stop">
          <h2>Puesto ${i}</h2>
          <p>Sin producción</p>
        </div>
      `;
    }
  }

  document.getElementById('grid').innerHTML = html;
}

// refresco cada 3 segundos
setInterval(cargar, 3000);
cargar();
</script>

</body>
</html>
