<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOIE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#061537;
  --green:#1f8f53;
  --gray:#7b8590;
  --red:#c73b3b;
  --orange:#d9821f;
  --overlay:rgba(255,255,255,0.12);
}

body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:8px;
}

.header-left{ width:220px; }
.header-center{ flex:1; text-align:center; }
.header-right{
  width:220px;
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}

.header img{ height:70px; }

h1{
  font-size:48px;
  margin:0;
  font-weight:900;
  text-align:center;
}

.subtitulo-row{
  margin-top:10px;
  display:flex;
  justify-content:flex-start;
  align-items:center;
}

.subtitulo{
  text-align:left;
  font-size:24px;
  font-weight:700;
}

.linea-titulo{
  margin:26px 0 10px;
  font-size:28px;
  font-weight:900;
  text-transform:uppercase;
}

.grid{
  display:grid;
  gap:14px;
}

.grid.motor{grid-template-columns:repeat(6,1fr)}
.grid.viesa{grid-template-columns:repeat(4,1fr)}
.grid.varios{grid-template-columns:repeat(7,1fr)}

.card{
  padding:16px;
  border-radius:16px;
  min-height:430px;
}

.produciendo{ background:var(--green); }
.esperando{ background:var(--gray); }
.parado{ background:var(--red); }
.turno{ background:var(--orange); }

.blink{ animation:blink 1s infinite; }

@keyframes blink{
  50%{ opacity:0.4; }
}

.titulo{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
  text-transform:uppercase;
}

.campo{
  font-size:15px;
  margin:6px 0;
  text-transform:uppercase;
}

.contador{
  margin-top:12px;
  background:var(--overlay);
  padding:10px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:900;
}

.ok{ color:#00ff88; }
.mal{ color:#ff3b3b; }

.botones{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  gap:10px;
  align-items:center;
  z-index:999;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:white;
}

.reset{ background:#ff8a00; }

.info-reset{
  background:rgba(255,255,255,0.12);
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
}

.back-kpi{
  position:fixed;
  bottom:20px;
  left:20px;
  z-index:999;
}

.back-kpi a{
  display:inline-block;
  background:#2f80ed;
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:800;
}

@media (max-width:1600px){
  .grid.motor,.grid.varios{grid-template-columns:repeat(3,1fr)}
  .grid.viesa{grid-template-columns:repeat(2,1fr)}
}

@media (max-width:900px){
  .grid.motor,.grid.viesa,.grid.varios{grid-template-columns:1fr}
  .botones{
    left:20px;
    right:20px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left"></div>
  <div class="header-center">
    <h1>MOIE</h1>
  </div>
  <div class="header-right">
    <img src="logo_colven.png" alt="Colven">
  </div>
</div>

<div class="subtitulo-row">
  <div class="subtitulo">DASHBOARD KPI INDUSTRIAL</div>
</div>

<div class="linea-titulo">LÍNEA MOTOR</div>
<div class="grid motor" id="grid-motor"></div>

<div class="linea-titulo">LÍNEA VIESA</div>
<div class="grid viesa" id="grid-viesa"></div>

<div class="linea-titulo">LÍNEA VARIOS</div>
<div class="grid varios" id="grid-varios"></div>

<div class="back-kpi">
  <a href="dashboard_kpi.html">← VOLVER A KPI INDUSTRIALES</a>
</div>

<div class="botones">
  <button class="btn reset" onclick="reiniciarDashboard()">REINICIAR GLOBAL</button>
  <div class="info-reset" id="infoReset">REINICIO GLOBAL: SIN CONFIGURAR</div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

const CONFIG = {
  "LINEA MOTOR": { puestos: [1,2,3,4,5,6], objetivos: {1:13,2:13,3:13,4:13,5:25} },
  "LINEA VIESA": { puestos: [1,2,3,4], objetivos: {1:13,2:13,3:13,4:13} },
  "LINEA VARIOS": { puestos: [1,2,3,4,5,6,7], objetivos: {} }
};

let intervalo = null;

function parseFecha(valor){
  if(!valor) return null;
  const f = new Date(valor);
  return isNaN(f.getTime()) ? null : f;
}

function formatHoraArgentina(fecha){
  if(!fecha) return "SIN CONFIGURAR";
  return new Intl.DateTimeFormat('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  }).format(fecha);
}

function format(ms){
  if(!ms || ms < 0 || isNaN(ms)) ms = 0;
  const totalSeg = Math.floor(ms / 1000);
  const horas = Math.floor(totalSeg / 3600);
  const minutos = Math.floor((totalSeg % 3600) / 60);
  const segundos = totalSeg % 60;
  return `${String(horas).padStart(2,'0')}:${String(minutos).padStart(2,'0')}:${String(segundos).padStart(2,'0')}`;
}

function piezasProgramadas(linea, puesto, tiempoTotalMs){
  let objetivoMin = null;

  if (linea === 'LINEA MOTOR' && [1,2,3,4].includes(Number(puesto))) {
    objetivoMin = 13;
  }

  if (linea === 'LINEA MOTOR' && Number(puesto) === 5) {
    objetivoMin = 25;
  }

  if (!objetivoMin || !tiempoTotalMs || tiempoTotalMs <= 0) return 0;

  const objetivoMs = objetivoMin * 60 * 1000;
  return Math.floor(tiempoTotalMs / objetivoMs);
}

async function obtenerControl(){
  const { data, error } = await supabaseClient
    .from('dashboard_control')
    .select('id, reset_desde, sesion_actual')
    .eq('id', 1)
    .single();

  if (error) {
    console.log("Error leyendo dashboard_control:", error);
    return { reset_desde: null, sesion_actual: 1 };
  }

  return {
    reset_desde: data?.reset_desde ? parseFecha(data.reset_desde) : null,
    sesion_actual: data?.sesion_actual || 1
  };
}

async function actualizarInfoReset(){
  const control = await obtenerControl();
  document.getElementById("infoReset").innerText =
    control.reset_desde
      ? "REINICIO GLOBAL DESDE: " + formatHoraArgentina(control.reset_desde)
      : "REINICIO GLOBAL: SIN CONFIGURAR";
}

function nombrePuesto(linea, puesto){
  if (linea === 'LINEA MOTOR' && puesto === 6) return 'PROBADOR';
  return 'PUESTO ' + puesto;
}

function renderLinea(linea, regsLinea, mapaOperarios){
  const cfg = CONFIG[linea];
  let html = '';

  cfg.puestos.forEach((p) => {
    const regsPuesto = regsLinea
      .filter(x => Number(x.puesto) === p)
      .sort((a,b) => parseFecha(a.inicio) - parseFecha(b.inicio));

    let estado = "ESPERANDO";
    let clase = "esperando";
    let blink = "";
    let legajo = "-";
    let nombre = "-";
    let producto = "-";
    let motivo = "-";
    let tiempoTotalMs = 0;
    let tiempoParadaMs = 0;
    let tiempoCodigoMs = 0;

    const lecturas = regsPuesto.filter(r => (r.tipo_registro || '').toLowerCase() === 'lectura').length;
    const piezas = Math.max(lecturas - 1, 0);

    const ultimaLectura = [...regsPuesto].reverse().find(r => (r.tipo_registro || '').toLowerCase() === 'lectura');
    const ultimoEvento = regsPuesto.length ? regsPuesto[regsPuesto.length - 1] : null;

    if (regsPuesto.length === 0) {
      html += `
        <div class="card esperando">
          <div class="titulo">${nombrePuesto(linea, p)}</div>
          <div class="campo"><b>ESTADO:</b> ESPERANDO</div>
          <div class="campo"><b>LEGAJO:</b> -</div>
          <div class="campo"><b>OPERARIO:</b> -</div>
          <div class="campo"><b>PRODUCTO:</b> -</div>
          <div class="campo"><b>MOTIVO:</b> -</div>
          <div class="campo" style="display:flex;justify-content:space-between;gap:10px;">
            <span><b>PIEZAS FABRICADAS:</b> 0</span>
            <span><b>PIEZAS PROGRAMADAS:</b> 0</span>
          </div>
          <div class="contador">TIEMPO TOTAL<div class="valor">00:00:00</div></div>
          <div class="contador">CODIGO EN CURSO<div class="valor">00:00:00</div></div>
          <div class="contador">TIEMPO PARADA<div class="valor">00:00:00</div></div>
        </div>
      `;
      return;
    }

    const inicioPrimero = parseFecha(regsPuesto[0].inicio);
    if (inicioPrimero) {
      if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado') {
        const finTurno = parseFecha(ultimoEvento.fin || ultimoEvento.inicio);
        tiempoTotalMs = finTurno ? Math.max(finTurno.getTime() - inicioPrimero.getTime(), 0) : 0;
      } else {
        tiempoTotalMs = Math.max(Date.now() - inicioPrimero.getTime(), 0);
      }
    }

    regsPuesto.forEach(r => {
      const inicio = parseFecha(r.inicio);
      const fin = parseFecha(r.fin);
      const estadoReg = (r.estado || '').toLowerCase();
      if (!inicio) return;

      if (estadoReg === 'parado') {
        if (fin) tiempoParadaMs += Math.max(fin.getTime() - inicio.getTime(), 0);
        else tiempoParadaMs += Math.max(Date.now() - inicio.getTime(), 0);
      }
    });

    const activoProduccion = regsPuesto.find(r => r.fin == null && (r.estado || '').toLowerCase() === 'produciendo');
    const activoParada = regsPuesto.find(r => r.fin == null && (r.estado || '').toLowerCase() === 'parado');

    if (ultimaLectura) {
      const inicioLectura = parseFecha(ultimaLectura.inicio);
      if (inicioLectura) {
        if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado') {
          const finTurno = parseFecha(ultimoEvento.fin || ultimoEvento.inicio);
          if (finTurno) {
            tiempoCodigoMs = Math.max(finTurno.getTime() - inicioLectura.getTime(), 0);
          }
        } else {
          tiempoCodigoMs = Math.max(Date.now() - inicioLectura.getTime(), 0);
        }
      }
    }

    if (ultimoEvento && (ultimoEvento.estado || '').toLowerCase() === 'turno_finalizado') {
      estado = 'TURNO FINALIZADO';
      clase = 'turno';
      legajo = ultimoEvento.operario || '-';
      nombre = mapaOperarios[String(ultimoEvento.operario)] || '-';
      const ultimoProd = [...regsPuesto].reverse().find(r =>
        ['lectura','continuacion','cambio_operario'].includes((r.tipo_registro || '').toLowerCase())
      );
      if (ultimoProd) producto = ultimoProd.producto || '-';
    } else if (activoProduccion) {
      estado = 'PRODUCIENDO';
      clase = 'produciendo';
      legajo = activoProduccion.operario || '-';
      nombre = mapaOperarios[String(activoProduccion.operario)] || '-';
      producto = activoProduccion.producto || '-';
    } else if (activoParada) {
      estado = 'PARADO';
      clase = 'parado';
      blink = 'blink';
      legajo = activoParada.operario || '-';
      nombre = mapaOperarios[String(activoParada.operario)] || '-';
      producto = activoParada.producto || '-';
      motivo = activoParada.motivo_parada || '-';
    }

    let estadoTiempo = '';
    const objetivoMin = cfg.objetivos[p];
    if (objetivoMin) {
      const objetivoMs = objetivoMin * 60 * 1000;
      estadoTiempo = tiempoCodigoMs <= objetivoMs
        ? `<span class="ok">OK</span>`
        : `<span class="mal">EXCEDIDO</span>`;
    }

    html += `
      <div class="card ${clase} ${blink}">
        <div class="titulo">${nombrePuesto(linea, p)}</div>
        <div class="campo"><b>ESTADO:</b> ${estado}</div>
        <div class="campo"><b>LEGAJO:</b> ${legajo}</div>
        <div class="campo"><b>OPERARIO:</b> ${nombre}</div>
        <div class="campo"><b>PRODUCTO:</b> ${producto}</div>
        <div class="campo"><b>MOTIVO:</b> ${motivo}</div>
        <div class="campo" style="display:flex;justify-content:space-between;gap:10px;">
          <span><b>PIEZAS FABRICADAS:</b> ${piezas}</span>
          <span><b>PIEZAS PROGRAMADAS:</b> ${piezasProgramadas(linea, p, tiempoTotalMs)}</span>
        </div>

        <div class="contador">TIEMPO TOTAL<div class="valor">${format(tiempoTotalMs)}</div></div>
        <div class="contador">CODIGO EN CURSO<div class="valor">${format(tiempoCodigoMs)} ${estadoTiempo}</div></div>
        <div class="contador">TIEMPO PARADA<div class="valor">${format(tiempoParadaMs)}</div></div>
      </div>
    `;
  });

  return html;
}

async function cargar(){
  const { data: reg = [], error: errReg } = await supabaseClient
    .from('registros')
    .select('*')
    .order('inicio', { ascending: true });

  const { data: ops = [], error: errOps } = await supabaseClient
    .from('operarios')
    .select('*');

  if (errReg || errOps) {
    console.log(errReg || errOps);
    return;
  }

  const control = await obtenerControl();
  const sesionActual = control.sesion_actual;

  const mapaOperarios = {};
  ops.forEach(o => { mapaOperarios[String(o.legajo)] = o.nombre; });

  const regsSesion = reg.filter(x => Number(x.sesion_dashboard || 1) === Number(sesionActual));

  document.getElementById('grid-motor').innerHTML =
    renderLinea('LINEA MOTOR', regsSesion.filter(x => x.linea === 'LINEA MOTOR'), mapaOperarios);

  document.getElementById('grid-viesa').innerHTML =
    renderLinea('LINEA VIESA', regsSesion.filter(x => x.linea === 'LINEA VIESA'), mapaOperarios);

  document.getElementById('grid-varios').innerHTML =
    renderLinea('LINEA VARIOS', regsSesion.filter(x => x.linea === 'LINEA VARIOS'), mapaOperarios);

  await actualizarInfoReset();
}

function iniciar(){
  if (intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar, 1000);
}

async function reiniciarDashboard(){
  const { data: control, error: errControl } = await supabaseClient
    .from('dashboard_control')
    .select('sesion_actual')
    .eq('id', 1)
    .single();

  if (errControl) {
    alert("Error leyendo sesión actual");
    console.log(errControl);
    return;
  }

  const nuevaSesion = (control?.sesion_actual || 1) + 1;
  const ts = new Date().toISOString();

  const { error: errUpdate } = await supabaseClient
    .from('dashboard_control')
    .upsert(
      [{ id: 1, reset_desde: ts, sesion_actual: nuevaSesion }],
      { onConflict: 'id' }
    );

  if (errUpdate) {
    alert("Error reiniciando dashboard");
    console.log(errUpdate);
    return;
  }

  clearInterval(intervalo);
  document.getElementById("grid-motor").innerHTML = "";
  document.getElementById("grid-viesa").innerHTML = "";
  document.getElementById("grid-varios").innerHTML = "";
  setTimeout(() => iniciar(), 300);
}

iniciar();
</script>

</body>
</html>
