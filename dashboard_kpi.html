<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KPI INDUSTRIALES</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root{
  --bg:#eef3f7;
  --card:#ffffff;
  --border:#d8e1ea;
  --text:#17324a;
  --muted:#6f8294;
  --blue:#1f78d1;
  --green:#1fa15a;
  --red:#d64545;
  --orange:#e58b1b;
  --gray:#8391a0;
  --shadow:0 8px 20px rgba(0,0,0,.08);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:24px;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#edf2f7 0%, #e7edf4 100%);
  color:var(--text);
}

.header{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:20px;
  margin-bottom:24px;
}

.header-left{
  display:flex;
  justify-content:center;
  align-items:center;
}

.header-left h1{
  margin:0;
  font-size:52px;
  font-weight:900;
  text-align:center;
}

.logo{
  height:96px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:6px;
  box-shadow:var(--shadow);
}

.info-reset{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 14px;
  box-shadow:var(--shadow);
  font-size:14px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:20px;
}

.section-title{
  margin:12px 0 16px;
  font-size:30px;
  font-weight:900;
  color:var(--text);
  text-transform:uppercase;
}

.grid-sectores,
.grid-lineas{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow);
}

.card.clickable{
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}

.card.clickable:hover{
  transform:translateY(-3px);
  box-shadow:0 14px 28px rgba(0,0,0,.12);
}

.card h3{
  margin:0 0 14px;
  font-size:26px;
  font-weight:900;
  text-transform:uppercase;
  text-align:center;
}

.kpi-row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:12px;
}

.kpi{
  background:#f7fafc;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.kpi .label{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:6px;
}

.kpi .value{
  font-size:24px;
  font-weight:900;
  color:var(--text);
}

.estado-bad{ color:var(--red); }
.estado-good{ color:var(--green); }
.estado-mid{ color:var(--orange); }

.hidden{ display:none; }

.topbar-detalle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:10px;
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
}

.btn-back{ background:var(--blue); }
.btn-detail{ background:var(--orange); }

.linea-chip{
  display:inline-block;
  border-radius:999px;
  padding:8px 12px;
  font-weight:800;
  font-size:13px;
  margin-bottom:12px;
  color:#fff;
}

.chip-motor{ background:var(--blue); }
.chip-viesa{ background:var(--green); }
.chip-varios{ background:var(--orange); }
.chip-default{ background:var(--gray); }

.lista{
  margin:0;
  padding-left:18px;
}

.lista li{
  margin:6px 0;
  font-weight:700;
  color:var(--text);
}

.vacio{
  background:#fff;
  border:1px dashed var(--border);
  border-radius:16px;
  padding:24px;
  color:var(--muted);
  font-weight:700;
}

.chart-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:14px 0 8px;
}

.donut{
  width:150px;
  height:150px;
}

.donut text{
  font-size:16px;
  font-weight:900;
  fill:var(--text);
}

.small-note{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  margin-top:4px;
}

@media (max-width:1200px){
  .grid-sectores,
  .grid-lineas{
    grid-template-columns:repeat(2,1fr);
  }
}

@media (max-width:800px){
  .grid-sectores,
  .grid-lineas{
    grid-template-columns:1fr;
  }

  .header{
    grid-template-columns:1fr;
  }

  .header-left{
    justify-content:flex-start;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>KPI INDUSTRIALES</h1>
  </div>
  <img src="logo_colven.png" alt="Colven" class="logo">
</div>

<div class="info-reset" id="infoReset">REINICIO GLOBAL: SIN CONFIGURAR</div>

<!-- VISTA GENERAL -->
<div id="vistaGeneral">
  <div class="section-title">SECTORES</div>
  <div class="grid-sectores" id="gridSectores"></div>
</div>

<!-- VISTA DETALLE -->
<div id="vistaDetalle" class="hidden">
  <div class="topbar-detalle">
    <div>
      <button class="btn btn-back" onclick="volverSectores()">← VOLVER A SECTORES</button>
    </div>
    <div id="contenedorDetalleSectorBtn"></div>
  </div>

  <div class="section-title" id="tituloDetalleSector">SECTOR</div>
  <div class="grid-lineas" id="gridLineasDetalle"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let intervalo = null;
let sectorActual = null;

const SECTORES = [
  "MOV",
  "TORNERIA",
  "MECANIZADO",
  "MOIE",
  "VIESA",
  "INYECCION"
];

const LINEAS_POR_SECTOR = {
  "MOIE": ["LINEA MOTOR", "LINEA VIESA", "LINEA VARIOS"],
  "MOV": [],
  "TORNERIA": [],
  "MECANIZADO": [],
  "VIESA": [],
  "INYECCION": []
};

function parseFecha(valor){
  if(!valor) return null;
  const d = new Date(valor);
  return isNaN(d.getTime()) ? null : d;
}

function formatHoraArgentina(fecha){
  if(!fecha) return "SIN CONFIGURAR";
  return new Intl.DateTimeFormat('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  }).format(fecha);
}

function format(ms){
  if(!ms || ms < 0 || isNaN(ms)) ms = 0;
  const totalSeg = Math.floor(ms / 1000);
  const horas = Math.floor(totalSeg / 3600);
  const minutos = Math.floor((totalSeg % 3600) / 60);
  const segundos = totalSeg % 60;
  return `${String(horas).padStart(2,'0')}:${String(minutos).padStart(2,'0')}:${String(segundos).padStart(2,'0')}`;
}

async function obtenerControl(){
  const { data, error } = await supabaseClient
    .from('dashboard_control')
    .select('id, reset_desde, sesion_actual')
    .eq('id', 1)
    .single();

  if(error){
    console.log(error);
    return { reset_desde: null, sesion_actual: 1 };
  }

  return {
    reset_desde: data?.reset_desde ? parseFecha(data.reset_desde) : null,
    sesion_actual: data?.sesion_actual || 1
  };
}

async function actualizarInfoReset(){
  const control = await obtenerControl();
  document.getElementById("infoReset").innerText =
    control.reset_desde
      ? "REINICIO GLOBAL DESDE: " + formatHoraArgentina(control.reset_desde)
      : "REINICIO GLOBAL: SIN CONFIGURAR";
}

function calcularKpiGrupo(regs){
  const piezas = regs.filter(r => (r.tipo_registro || '').toLowerCase() === 'lectura').length;

  const activosProd = regs.filter(r =>
    (r.estado || '').toLowerCase() === 'produciendo' && r.fin == null
  );

  const activosParada = regs.filter(r =>
    (r.estado || '').toLowerCase() === 'parado' && r.fin == null
  );

  const puestosProduciendo = new Set(activosProd.map(r => `${r.linea}::${r.puesto}`)).size;
  const puestosParados = new Set(activosParada.map(r => `${r.linea}::${r.puesto}`)).size;

  const todosPuestosConActividad = new Set(
    regs.map(r => `${r.linea}::${r.puesto}`)
  ).size;

  const puestosEsperando = Math.max(todosPuestosConActividad - puestosProduciendo - puestosParados, 0);

  const operariosActivos = new Set(
    [...activosProd, ...activosParada]
      .map(r => r.operario)
      .filter(Boolean)
  ).size;

  let tiempoParadaMs = 0;
  regs.forEach(r => {
    if ((r.estado || '').toLowerCase() !== 'parado') return;
    const inicio = parseFecha(r.inicio);
    const fin = parseFecha(r.fin);
    if (!inicio) return;
    if (fin) tiempoParadaMs += Math.max(fin.getTime() - inicio.getTime(), 0);
    else tiempoParadaMs += Math.max(Date.now() - inicio.getTime(), 0);
  });

  return {
    piezas,
    puestosProduciendo,
    puestosParados,
    puestosEsperando,
    operariosActivos,
    tiempoParadaMs
  };
}

function semaforoGrupo(kpi){
  if (kpi.puestosParados > 0) return ['ATENCIÓN', 'estado-bad'];
  if (kpi.puestosProduciendo > 0) return ['OPERANDO', 'estado-good'];
  return ['SIN ACTIVIDAD', 'estado-mid'];
}

function contarEstados(kpi){
  return {
    produciendo: kpi.puestosProduciendo,
    parados: kpi.puestosParados,
    esperando: kpi.puestosEsperando
  };
}

function donutSvg(estados){
  const total = estados.produciendo + estados.parados + estados.esperando;

  if (total === 0) {
    return `
      <svg class="donut" viewBox="0 0 42 42">
        <circle cx="21" cy="21" r="15.9155" fill="none" stroke="#d8e1ea" stroke-width="6"></circle>
        <text x="21" y="21" text-anchor="middle" dominant-baseline="middle">0</text>
      </svg>
    `;
  }

  const p1 = (estados.produciendo / total) * 100;
  const p2 = (estados.parados / total) * 100;
  const p3 = (estados.esperando / total) * 100;

  return `
    <svg class="donut" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15.9155" fill="none" stroke="#e8eef5" stroke-width="6"></circle>

      <circle cx="21" cy="21" r="15.9155" fill="none"
        stroke="#1fa15a" stroke-width="6"
        stroke-dasharray="${p1} ${100-p1}" stroke-dashoffset="25"></circle>

      <circle cx="21" cy="21" r="15.9155" fill="none"
        stroke="#d64545" stroke-width="6"
        stroke-dasharray="${p2} ${100-p2}" stroke-dashoffset="${25-p1}"></circle>

      <circle cx="21" cy="21" r="15.9155" fill="none"
        stroke="#8391a0" stroke-width="6"
        stroke-dasharray="${p3} ${100-p3}" stroke-dashoffset="${25-p1-p2}"></circle>

      <text x="21" y="21" text-anchor="middle" dominant-baseline="middle">${total}</text>
    </svg>
  `;
}

function renderSectorCard(nombre, kpi){
  const [estadoTexto, estadoClase] = semaforoGrupo(kpi);
  const chart = donutSvg(contarEstados(kpi));

  return `
    <div class="card clickable" onclick="abrirSector('${nombre.replace(/'/g, "\\'")}')">
      <h3>${nombre}</h3>

      <div class="chart-wrap">${chart}</div>
      <div class="small-note">Distribución de puestos</div>

      <div class="kpi-row">
        <div class="kpi">
          <div class="label">PIEZAS PRODUCIDAS</div>
          <div class="value">${kpi.piezas}</div>
        </div>
        <div class="kpi">
          <div class="label">OPERARIOS ACTIVOS</div>
          <div class="value">${kpi.operariosActivos}</div>
        </div>
        <div class="kpi">
          <div class="label">PUESTOS PRODUCIENDO</div>
          <div class="value">${kpi.puestosProduciendo}</div>
        </div>
        <div class="kpi">
          <div class="label">PUESTOS PARADOS</div>
          <div class="value">${kpi.puestosParados}</div>
        </div>
        <div class="kpi">
          <div class="label">PUESTOS ESPERANDO</div>
          <div class="value">${kpi.puestosEsperando}</div>
        </div>
        <div class="kpi">
          <div class="label">ESTADO GENERAL</div>
          <div class="value ${estadoClase}" style="font-size:20px;">${estadoTexto}</div>
        </div>
      </div>
    </div>
  `;
}

function top5Paradas(regs){
  const mapa = {};

  regs.forEach(r => {
    if ((r.estado || '').toLowerCase() !== 'parado') return;

    const motivo = (r.motivo_parada || 'SIN MOTIVO').toUpperCase();
    const inicio = parseFecha(r.inicio);
    const fin = parseFecha(r.fin);

    let duracion = 0;
    if (inicio) {
      if (fin) duracion = Math.max(fin.getTime() - inicio.getTime(), 0);
      else duracion = Math.max(Date.now() - inicio.getTime(), 0);
    }

    if (!mapa[motivo]) {
      mapa[motivo] = {
        cantidad: 0,
        tiempoMs: 0
      };
    }

    mapa[motivo].cantidad += 1;
    mapa[motivo].tiempoMs += duracion;
  });

  return Object.entries(mapa)
    .map(([motivo, datos]) => ({
      motivo,
      cantidad: datos.cantidad,
      tiempoMs: datos.tiempoMs
    }))
    .sort((a,b) => b.cantidad - a.cantidad)
    .slice(0,5);
}

function piezasPorPuesto(regs){
  const mapa = {};
  regs.forEach(r => {
    if ((r.tipo_registro || '').toLowerCase() !== 'lectura') return;
    const puesto = `PUESTO ${r.puesto}`;
    mapa[puesto] = (mapa[puesto] || 0) + 1;
  });

  return Object.entries(mapa).sort((a,b) => {
    const na = parseInt(a[0].replace(/\D/g,'')) || 0;
    const nb = parseInt(b[0].replace(/\D/g,'')) || 0;
    return na - nb;
  });
}

function chipClass(nombre){
  if (nombre === 'LINEA MOTOR') return 'chip-motor';
  if (nombre === 'LINEA VIESA') return 'chip-viesa';
  if (nombre === 'LINEA VARIOS') return 'chip-varios';
  return 'chip-default';
}

function renderLineaCard(nombre, regsLinea){
  const kpi = calcularKpiGrupo(regsLinea);
  const [estadoTexto, estadoClase] = semaforoGrupo(kpi);
  const chart = donutSvg(contarEstados(kpi));
  const piezasPuesto = piezasPorPuesto(regsLinea);
  const paradas = top5Paradas(regsLinea);

  const htmlPiezas = piezasPuesto.length
    ? `<ul class="lista">${piezasPuesto.map(x => `<li>${x[0]}: ${x[1]}</li>`).join('')}</ul>`
    : `<div class="small-note">Sin piezas registradas</div>`;

  const htmlParadas = paradas.length
    ? `<ul class="lista">${paradas.map(x => `<li>${x.motivo}: ${x.cantidad} | ${format(x.tiempoMs)}</li>`).join('')}</ul>`
    : `<div class="small-note">Sin paradas registradas</div>`;

  return `
    <div class="card">
      <div class="linea-chip ${chipClass(nombre)}">${nombre}</div>

      <div class="chart-wrap">${chart}</div>
      <div class="small-note">Distribución de estados de la línea</div>

      <div class="kpi-row">
        <div class="kpi" style="grid-column: span 2;">
          <div class="label">CANTIDAD DE PIEZAS POR PUESTO</div>
          ${htmlPiezas}
        </div>

        <div class="kpi">
          <div class="label">OPERARIOS ACTIVOS</div>
          <div class="value">${kpi.operariosActivos}</div>
        </div>

        <div class="kpi">
          <div class="label">PUESTOS PRODUCIENDO</div>
          <div class="value">${kpi.puestosProduciendo}</div>
        </div>

        <div class="kpi">
          <div class="label">PUESTOS PARADOS</div>
          <div class="value">${kpi.puestosParados}</div>
        </div>

        <div class="kpi">
          <div class="label">PUESTOS ESPERANDO</div>
          <div class="value">${kpi.puestosEsperando}</div>
        </div>

        <div class="kpi">
          <div class="label">ESTADO</div>
          <div class="value ${estadoClase}" style="font-size:20px;">${estadoTexto}</div>
        </div>

        <div class="kpi" style="grid-column: span 2;">
          <div class="label">TOP 5 PARADAS EN EL TURNO</div>
          ${htmlParadas}
        </div>
      </div>
    </div>
  `;
}

async function cargar(){
  const { data: reg = [], error: errReg } = await supabaseClient
    .from('registros')
    .select('*');

  if(errReg){
    console.log(errReg);
    return;
  }

  const control = await obtenerControl();
  const sesionActual = control.sesion_actual;

  const regsSesion = reg.filter(r => Number(r.sesion_dashboard || 1) === Number(sesionActual));

  renderGeneral(regsSesion);

  if (sectorActual) {
    renderDetalle(regsSesion, sectorActual);
  }

  await actualizarInfoReset();
}

function renderGeneral(regsSesion){
  let htmlSectores = '';

  SECTORES.forEach((sector) => {
    const regsSector = regsSesion.filter(r => (r.sector || '') === sector);
    const kpi = calcularKpiGrupo(regsSector);
    htmlSectores += renderSectorCard(sector, kpi);
  });

  document.getElementById('gridSectores').innerHTML = htmlSectores;
}

function renderDetalle(regsSesion, sector){
  const lineas = LINEAS_POR_SECTOR[sector] || [];
  document.getElementById('tituloDetalleSector').innerText = `SECTOR: ${sector}`;

  const contenedorBtn = document.getElementById('contenedorDetalleSectorBtn');
  if (sector === 'MOIE') {
    contenedorBtn.innerHTML = `<a href="dashboard.html" style="text-decoration:none;"><button class="btn btn-detail">DETALLE SECTOR</button></a>`;
  } else {
    contenedorBtn.innerHTML = '';
  }

  if (!lineas.length) {
    document.getElementById('gridLineasDetalle').innerHTML =
      `<div class="vacio">NO HAY LÍNEAS CONFIGURADAS PARA ESTE SECTOR.</div>`;
    return;
  }

  const regsSector = regsSesion.filter(r => (r.sector || '') === sector);

  let html = '';
  lineas.forEach(linea => {
    const regsLinea = regsSector.filter(r => (r.linea || '') === linea);
    html += renderLineaCard(linea, regsLinea);
  });

  document.getElementById('gridLineasDetalle').innerHTML = html;
}

function abrirSector(sector){
  sectorActual = sector;
  document.getElementById('vistaGeneral').classList.add('hidden');
  document.getElementById('vistaDetalle').classList.remove('hidden');
  cargar();
}

function volverSectores(){
  sectorActual = null;
  document.getElementById('vistaDetalle').classList.add('hidden');
  document.getElementById('vistaGeneral').classList.remove('hidden');
}

function iniciar(){
  if (intervalo) clearInterval(intervalo);
  cargar();
  intervalo = setInterval(cargar, 3000);
}

iniciar();
</script>

</body>
</html>
