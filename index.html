<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Linea Motor MOIE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    :root{
      --bg:#10151b;
      --panel:#1a222c;
      --panel-2:#222c38;
      --text:#f3f6fa;
      --muted:#aeb8c4;
      --border:#324150;
      --blue:#2f80ed;
      --green:#1faa59;
      --red:#d64545;
      --white:#ffffff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#0f141a 0%, #151d26 100%);
      color:var(--text);
      padding:24px;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
      display:grid;
      gap:20px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    .header-title{
      font-size:34px;
      font-weight:800;
      margin:0 0 8px 0;
    }

    .section-title{
      font-size:28px;
      font-weight:800;
      margin:0 0 6px 0;
    }

    .mini-title{
      font-size:20px;
      font-weight:800;
      margin:18px 0 10px 0;
      text-transform:uppercase;
    }

    .label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
    }

    input{
      width:100%;
      max-width:360px;
      background:var(--panel-2);
      color:var(--white);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px 16px;
      font-size:20px;
      outline:none;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:14px 18px;
      cursor:pointer;
      font-size:16px;
      font-weight:700;
      color:white;
    }

    .btn-primary{ background:var(--blue); }
    .btn-success{ background:var(--green); }
    .btn-danger{ background:var(--red); }
    .btn-gray{ background:#425160; }

    .grupo-botones{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .btn-puesto{
      min-width:110px;
      background:#354252;
      color:#dce5ee;
    }

    .btn-puesto.activo{
      background:var(--blue);
    }

    .bloqueado{
      pointer-events:none;
      opacity:.65;
    }

    .status-box{
      min-width:280px;
      padding:18px 20px;
      border-radius:16px;
      font-size:22px;
      font-weight:800;
      text-align:center;
      color:white;
      margin-top:18px;
      display:inline-block;
    }

    .esperando{ background:#66707c; }
    .produciendo{ background:#1fb263; }
    .parado{ background:#d64545; }

    .info-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:14px;
      margin-top:18px;
    }

    .info-card{
      background:var(--panel-2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
    }

    .info-card .k{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .info-card .v{
      font-size:24px;
      font-weight:800;
      word-break:break-word;
    }

    .tag{
      display:inline-block;
      background:#24303d;
      border:1px solid var(--border);
      color:#d9e3ee;
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      font-weight:700;
    }

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }

    .continuar-wrap{
      margin-top:14px;
      display:none;
    }

    .continuar-wrap.show{
      display:block;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1 class="header-title">INGRESE SU LEGAJO</h1>
      <label class="label">Legajo</label>
      <input id="legajo" placeholder="Ingresar legajo" oninput="buscarOperario()">
      <div id="nombreOperario" style="font-size:22px;font-weight:800;margin-top:12px;"></div>
      <div style="margin-top:14px;">
        <button class="btn btn-primary" onclick="login()">Ingresar</button>
      </div>
    </div>

    <div id="panel" class="card" style="display:none;">
      <h2 class="section-title">Linea Motor MOIE</h2>

      <div class="row">
        <div class="tag" id="operarioActivo">Operario: -</div>
        <div class="tag" id="puestoSeleccionadoTexto">Puesto seleccionado: Ninguno</div>
      </div>

      <div class="mini-title">Seleccionar puesto</div>
      <div id="puestos" class="grupo-botones">
        <button class="btn btn-puesto" onclick="seleccionarPuesto(1)">Puesto 1</button>
        <button class="btn btn-puesto" onclick="seleccionarPuesto(2)">Puesto 2</button>
        <button class="btn btn-puesto" onclick="seleccionarPuesto(3)">Puesto 3</button>
        <button class="btn btn-puesto" onclick="seleccionarPuesto(4)">Puesto 4</button>
        <button class="btn btn-puesto" onclick="seleccionarPuesto(5)">Puesto 5</button>
        <button class="btn btn-puesto" onclick="seleccionarPuesto(6)">Probador</button>
      </div>

      <div class="mini-title">Escanear QR</div>
      <label class="label">Lectura del producto</label>
      <input id="qr" placeholder="Escanear código QR" onkeydown="capturarEnterQR(event)">

      <div class="mini-title">Parada de puesto</div>
      <div class="grupo-botones">
        <button class="btn btn-gray" onclick="registrarParada('Falta material')">Falta material</button>
        <button class="btn btn-gray" onclick="registrarParada('Calidad')">Calidad</button>
        <button class="btn btn-gray" onclick="registrarParada('Descanso (Desayuno)')">Descanso (Desayuno)</button>
        <button class="btn btn-gray" onclick="registrarParada('Descanso (Almuerzo)')">Descanso (Almuerzo)</button>
        <button class="btn btn-gray" onclick="registrarParada('Ing.Procesos')">Ing.Procesos</button>
        <button class="btn btn-gray" onclick="registrarParada('Logistica')">Logistica</button>
      </div>

      <div id="continuarWrap" class="continuar-wrap">
        <button class="btn btn-success" onclick="continuarProduccion()">CONTINUAR PRODUCCIÓN</button>
      </div>

      <div id="estadoProduccion" class="status-box esperando">Esperando lectura</div>

      <div class="info-grid">
        <div class="info-card">
          <div class="k">Producto en curso</div>
          <div class="v" id="productoActual">-</div>
        </div>

        <div class="info-card">
          <div class="k">Inicio lectura actual</div>
          <div class="v" id="inicioActual">-</div>
        </div>

        <div class="info-card">
          <div class="k">Última parada</div>
          <div class="v" id="ultimaParada">-</div>
        </div>
      </div>
    </div>
  </div>

<script>
const supabaseClient = supabase.createClient(
  "https://gqlftpalwqybyywdplei.supabase.co",
  "sb_publishable_O3UlpvORDFvMmNM-lPwtnA_AKzOTpiy"
);

let operario = '';
let nombre = '';
let puestoSeleccionado = null;
let registroProduccionActual = null;
let registroParadaActual = null;
let productoEnCurso = null;
let ultimaParada = null;

async function buscarOperario() {
  const legajo = document.getElementById('legajo').value.trim();
  if (!legajo) {
    document.getElementById('nombreOperario').innerText = '';
    return;
  }

  const { data } = await supabaseClient
    .from('operarios')
    .select('*')
    .eq('legajo', legajo);

  document.getElementById('nombreOperario').innerText =
    (data && data.length) ? data[0].nombre : 'No encontrado';
}

async function login() {
  const legajo = document.getElementById('legajo').value.trim();

  const { data, error } = await supabaseClient
    .from('operarios')
    .select('*')
    .eq('legajo', legajo);

  if (error || !data || !data.length) {
    alert('Legajo inválido');
    return;
  }

  operario = legajo;
  nombre = data[0].nombre;

  document.getElementById('panel').style.display = 'block';
  document.getElementById('operarioActivo').innerText =
    "Operario: " + nombre + " (" + operario + ")";
}

function seleccionarPuesto(num) {
  if (puestoSeleccionado !== null) return;

  puestoSeleccionado = Number(num);

  const botones = document.querySelectorAll('.btn-puesto');
  botones.forEach(btn => btn.classList.remove('activo'));
  botones[num - 1].classList.add('activo');

  document.getElementById('puestoSeleccionadoTexto').innerText =
    "Puesto seleccionado: " + (num === 6 ? "Probador" : num);

  document.getElementById('puestos').classList.add('bloqueado');
  document.getElementById('qr').focus();
}

function limpiarProducto(valor) {
  if (!valor) return '';
  return valor.startsWith('0') ? valor.substring(1) : valor;
}

function capturarEnterQR(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    scan();
  }
}

function formatearFecha(fecha) {
  return new Date(fecha).toLocaleString('es-AR');
}

function setEstado(tipo) {
  const box = document.getElementById('estadoProduccion');
  box.className = 'status-box';

  if (tipo === 'produciendo') {
    box.classList.add('produciendo');
    box.innerText = 'Producción en proceso';
  } else if (tipo === 'parado') {
    box.classList.add('parado');
    box.innerText = 'Puesto detenido';
  } else {
    box.classList.add('esperando');
    box.innerText = 'Esperando lectura';
  }
}

async function cerrarParadaSiExiste() {
  if (!registroParadaActual) return;

  await supabaseClient
    .from('registros')
    .update({
      fin: new Date().toISOString()
    })
    .eq('id', registroParadaActual.id);

  registroParadaActual = null;
}

async function cerrarProduccionSiExiste() {
  if (!registroProduccionActual) return;

  await supabaseClient
    .from('registros')
    .update({
      fin: new Date().toISOString(),
      estado: 'finalizado'
    })
    .eq('id', registroProduccionActual.id);

  registroProduccionActual = null;
}

async function scan() {
  const qrInput = document.getElementById('qr');
  let qr = qrInput.value.trim();

  if (!puestoSeleccionado) {
    alert("Primero seleccioná un puesto");
    return;
  }

  if (!qr) return;

  qr = limpiarProducto(qr);
  const ahora = new Date().toISOString();

  await cerrarParadaSiExiste();
  await cerrarProduccionSiExiste();

  const { data, error } = await supabaseClient
    .from('registros')
    .insert({
      producto: qr,
      operario: operario,
      puesto: puestoSeleccionado,
      inicio: ahora,
      fin: null,
      estado: 'produciendo',
      motivo_parada: null
    })
    .select();

  if (error) {
    console.log(error);
    alert("Error al guardar producción");
    return;
  }

  registroProduccionActual = data[0];
  productoEnCurso = qr;
  ultimaParada = null;

  document.getElementById('productoActual').innerText = qr;
  document.getElementById('inicioActual').innerText = formatearFecha(ahora);
  document.getElementById('ultimaParada').innerText = '-';
  document.getElementById('continuarWrap').classList.remove('show');
  setEstado('produciendo');

  qrInput.value = '';
  qrInput.focus();
}

async function registrarParada(motivo) {
  if (!puestoSeleccionado) {
    alert("Primero seleccioná un puesto");
    return;
  }

  if (!registroProduccionActual) {
    alert("No hay producción activa para detener");
    return;
  }

  const ahora = new Date().toISOString();

  // cerrar producción actual
  await supabaseClient
    .from('registros')
    .update({
      fin: ahora,
      estado: 'finalizado'
    })
    .eq('id', registroProduccionActual.id);

  registroProduccionActual = null;

  // abrir tramo de parada
  const { data, error } = await supabaseClient
    .from('registros')
    .insert({
      producto: productoEnCurso,
      operario: operario,
      puesto: puestoSeleccionado,
      inicio: ahora,
      fin: null,
      estado: 'parado',
      motivo_parada: motivo
    })
    .select();

  if (error) {
    console.log(error);
    alert("Error al registrar parada");
    return;
  }

  registroParadaActual = data[0];
  ultimaParada = motivo;

  document.getElementById('ultimaParada').innerText = motivo;
  document.getElementById('continuarWrap').classList.add('show');
  setEstado('parado');
}

async function continuarProduccion() {
  if (!puestoSeleccionado) {
    alert("Primero seleccioná un puesto");
    return;
  }

  if (!productoEnCurso) {
    alert("No hay producto previo para continuar");
    return;
  }

  const ahora = new Date().toISOString();

  await cerrarParadaSiExiste();

  const { data, error } = await supabaseClient
    .from('registros')
    .insert({
      producto: productoEnCurso,
      operario: operario,
      puesto: puestoSeleccionado,
      inicio: ahora,
      fin: null,
      estado: 'produciendo',
      motivo_parada: null
    })
    .select();

  if (error) {
    console.log(error);
    alert("Error al continuar producción");
    return;
  }

  registroProduccionActual = data[0];

  document.getElementById('inicioActual').innerText = formatearFecha(ahora);
  document.getElementById('continuarWrap').classList.remove('show');
  setEstado('produciendo');
  document.getElementById('qr').focus();
}
</script>
</body>
</html>
